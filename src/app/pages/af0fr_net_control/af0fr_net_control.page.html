<div>
    <section class="relative overflow-hidden">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,rgba(249,115,22,0.45),transparent_80%),radial-gradient(circle_at_right,rgba(251,146,60,0.35),transparent_35%),linear-gradient(180deg,#fb923c_0%,#f97316_20%,#ea580c_100%)]"></div>
        <div class="absolute inset-0 opacity-[0.06] [background-image:linear-gradient(rgba(255,255,255,0.08)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.08)_1px,transparent_1px)] [background-size:32px_32px]"></div>

        <div class="relative mx-auto max-w-7xl px-6 py-10">
            <div class="pb-4 text-sm uppercase tracking-[0.32em] text-slate-950">
                Net Control
            </div>

            <script-panel
                    [openingScript]="openingScript"
                    [trafficPrompt]="trafficPrompt"
                    [lateCheckinPrompt]="lateCheckinPrompt"
                    [closingScript]="closingScript"
            />

            <div class="mt-6 grid gap-6 xl:grid-cols-[minmax(18rem,0.7fr)_minmax(0,1.6fr)]">
                <checkin-form
                        (callsignChanged)="onCallsignSearch($event)"
                        (stationAdded)="onStationAdded($event)"
                />

                <roster-table
                        [roster]="clubMembers"
                        [searchCallsign]="rosterSearchCallsign"
                        [checkedInCallsigns]="checkedInCallsigns"
                        [editing]="editing"
                        [pendingRemoveMemberId]="pendingRemoveRosterMemberId"
                        [removingMemberId]="removingRosterMemberId"
                        (checkIn)="checkInRosterMember($event)"
                        (memberChange)="updateRosterMember($event)"
                        (memberRemove)="removeRosterMember($event)"
                />
            </div>

            <div class="mt-6 grid gap-6 xl:grid-cols-2">
                <queue-panel
                        [queue]="queue"
                        (confirm)="confirmCheckIn($event)"
                />

                <!-- ... existing code ... -->
                <station-list
                        [stations]="stations"
                        [editing]="editing"
                        (setActive)="setActiveStation($event)"
                        (markComplete)="markStationComplete($event)"
                        (stationChange)="updateStation($event)"
                />
            </div>

            <div class="mt-6 rounded-2xl border border-slate-700 bg-slate-900/90 shadow">
                <!-- Header: status + roster edit toggle -->
                <div class="flex items-center justify-between gap-3 border-b border-slate-800 px-4 py-3">
                    <span
                            class="inline-flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-semibold uppercase tracking-wide text-white"
                            [class.bg-emerald-600]="backendOnline"
                            [class.bg-rose-700]="!backendOnline"
                    >
                        <span class="h-1.5 w-1.5 rounded-full bg-white/90"></span>
                        {{ backendOnline ? 'Shared' : 'Local fallback' }}
                    </span>

                    <button
                            type="button"
                            class="inline-flex items-center gap-1.5 rounded-lg border border-slate-700 bg-slate-950 px-3 py-1.5 text-xs font-semibold hover:border-orange-500 hover:text-orange-400"
                            [class.text-orange-400]="editing"
                            [class.border-orange-500]="editing"
                            [class.text-slate-400]="!editing"
                            title="Toggle roster edit mode"
                            (click)="toggleRosterEditing()"
                    >
                        {{ editing ? 'Editing' : 'Edit' }}
                    </button>
                </div>

                <!-- Session actions -->
                <div class="px-4 py-4">
                    <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-400">
                        Current session
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <input
                                type="text"
                                class="min-w-[220px] flex-1 rounded-lg border border-slate-600 bg-slate-800 px-3 py-2 text-sm text-white placeholder:text-slate-500"
                                [(ngModel)]="savedSessionName"
                                placeholder="Net name"
                        />

                        <button
                                type="button"
                                class="rounded-lg bg-orange-500 px-4 py-2 text-sm font-semibold text-white hover:bg-orange-400"
                                (click)="saveCurrentSession()"
                        >
                            Save net
                        </button>

                        <button
                                type="button"
                                class="rounded-lg border border-slate-600 bg-slate-800 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700"
                                (click)="exportCurrentSession()"
                        >
                            Export
                        </button>

                        <label
                                class="cursor-pointer rounded-lg border border-slate-600 bg-slate-800 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700"
                        >
                            Import
                            <input
                                    type="file"
                                    accept="application/json,.json"
                                    class="hidden"
                                    (change)="importSession($event)"
                            />
                        </label>
                        @if (editing) {
                            <button
                                    type="button"
                                    class="ml-auto rounded-lg border px-4 py-2 text-sm font-semibold disabled:cursor-wait disabled:opacity-75"
                                    [ngClass]="pendingClearCurrentSession
                                        ? 'border-rose-600 bg-rose-600 text-white'
                                        : 'border-rose-800 bg-transparent text-rose-300 hover:bg-rose-900/40 hover:text-rose-200'"
                                    (click)="clearCurrentSession()"
                                    [disabled]="isClearingCurrentSession"
                            >
                                {{ isClearingCurrentSession ? 'Clearing...' : pendingClearCurrentSession ? 'Confirm clear' : 'Clear current' }}
                            </button>
                        }
                    </div>
                </div>

                <!-- Saved nets -->
                <div class="border-t border-slate-800 px-4 py-4">
                    <div class="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-400">
                        Saved nets
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        <select
                                class="min-w-[240px] flex-1 rounded-lg border border-slate-600 bg-slate-800 px-3 py-2 text-sm text-white"
                                [(ngModel)]="selectedSavedSessionId"
                        >
                            <option value="">Select saved net</option>
                            <option
                                    *ngFor="let session of savedSessions"
                                    [value]="session.id"
                            >
                                {{ session.name || (session.savedAt | date:'short') }}
                                —
                                {{ session.stations.length || 0 }} stations
                            </option>
                        </select>

                        <button
                                type="button"
                                class="rounded-lg bg-orange-500 px-4 py-2 text-sm font-semibold text-white hover:bg-orange-400 disabled:cursor-not-allowed disabled:opacity-50"
                                (click)="loadSelectedSession()"
                                [disabled]="!selectedSavedSessionId"
                        >
                            Load
                        </button>
                        @if (editing) {
                            <button
                                    type="button"
                                    class="rounded-lg border border-rose-800 bg-transparent px-4 py-2 text-sm font-semibold text-rose-300 hover:bg-rose-900/40 hover:text-rose-200 disabled:cursor-not-allowed disabled:opacity-50"
                                    (click)="deleteSelectedSession()"
                                    [disabled]="!selectedSavedSessionId"
                            >
                                Delete
                            </button>
                        }
                    </div>
                </div>
            </div>
            <div class="mt-6">
                <session-log [entries]="logEntries" />
            </div>
        </div>
    </section>
</div>
