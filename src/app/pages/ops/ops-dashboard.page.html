<main class="min-h-screen bg-orange-500 px-2 py-2 text-slate-950 sm:px-3 sm:py-3">
    <div class="mx-auto max-w-[110rem] space-y-2">
        <header class="flex flex-wrap items-center justify-between gap-2 rounded-xl bg-slate-950 px-3 py-2 text-white shadow-xl">
            <div class="flex min-w-0 items-baseline gap-3">
                <h1 class="text-lg font-black tracking-tight sm:text-xl">AF0FR Operations</h1>
                <span class="hidden text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 sm:inline">On-air cockpit</span>
            </div>
            <div class="flex items-center gap-2 text-xs font-bold">
                <span class="hidden text-slate-400 md:inline">Log · bands · CW reference</span>
                <a routerLink="/cw" class="rounded-lg bg-slate-800 px-3 py-1.5 hover:bg-slate-700">Trainer</a>
                <a routerLink="/" class="rounded-lg bg-slate-800 px-3 py-1.5 hover:bg-slate-700">Toolbox</a>
            </div>
        </header>

        <div class="grid items-start gap-2 xl:grid-cols-[minmax(0,2.35fr)_minmax(19rem,1fr)]">
            <af0fr-logbook [embedded]="true" [cockpit]="true" />

            <aside class="grid min-w-0 gap-2 md:grid-cols-2 xl:sticky xl:top-14 xl:grid-cols-1" aria-label="Operating references">
                <ham-band-reference [embedded]="true" [compact]="true" />
                <ops-conditions />
                <cw-cheat-sheet [compact]="true" [showToolbar]="false" />
            </aside>
        </div>
    </div>
</main>
