<section class="overflow-hidden rounded-2xl bg-white shadow-xl ring-1 ring-slate-950/10">
    <header class="flex items-center justify-between bg-slate-950 px-3 py-2 text-white"><h2 class="text-sm font-black uppercase tracking-wider">Conditions &amp; Reports</h2><button type="button" class="text-[9px] font-black text-orange-400" (click)="refresh()">{{ loading ? 'Loading…' : 'Refresh' }}</button></header>
    <div class="grid grid-cols-4 gap-px bg-slate-200 text-center"><div class="bg-white p-2"><span class="block text-[8px] font-black uppercase text-slate-400">Kp</span><strong>{{ kp }}</strong></div><div class="bg-white p-2"><span class="block text-[8px] font-black uppercase text-slate-400">SFI</span><strong>{{ solarFlux }}</strong></div><div class="bg-white p-2"><span class="block text-[8px] font-black uppercase text-slate-400">Temp</span><strong>{{ temperature }}</strong></div><div class="bg-white p-2"><span class="block text-[8px] font-black uppercase text-slate-400">Wind</span><strong>{{ wind }}</strong></div></div>
    <div class="px-3 py-2 text-[10px]"><strong class="block">{{ recommendation }}</strong><span class="text-slate-500">Sunrise {{ sunrise }}Z · Sunset {{ sunset }}Z · {{ updated }}</span><div *ngIf="error" class="mt-1 font-bold text-red-700">{{ error }}</div></div>
    <footer class="grid grid-cols-2 gap-px bg-slate-200"><a class="bg-slate-100 px-3 py-2 text-center text-[10px] font-black hover:bg-orange-100" href="https://www.reversebeacon.net/main.php" target="_blank" rel="noopener">CW: Reverse Beacon ↗</a><a class="bg-slate-100 px-3 py-2 text-center text-[10px] font-black hover:bg-orange-100" href="https://pskreporter.info/pskmap.html?preset&callsign=AF0FR" target="_blank" rel="noopener">Digital: PSK Reporter ↗</a></footer>
</section>
