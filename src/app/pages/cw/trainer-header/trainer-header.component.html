<div class="space-y-4 sm:space-y-6">
    <header class="rounded-2xl bg-slate-950 p-5 text-white shadow-xl sm:rounded-3xl sm:p-8">
        <div class="flex items-start justify-between gap-4">
            <div class="min-w-0">
                <div class="text-[10px] font-semibold uppercase tracking-[0.28em] text-orange-400 sm:text-xs">AF0FR Toolbox</div>
                <h1 class="mt-2 text-3xl font-black tracking-tight sm:text-5xl">CW Copy Trainer</h1>
                <label class="mt-3 flex max-w-sm items-end gap-2 text-[10px] font-black uppercase tracking-wider text-slate-400">
                    <span class="min-w-0 flex-1">Callsign
                        <input class="mt-1 min-h-10 w-full rounded-xl border border-slate-700 bg-slate-900 px-3 font-mono text-sm font-bold uppercase tracking-normal text-white outline-none focus:border-orange-500" [value]="callsign" maxlength="16" autocorrect="off" spellcheck="false" (input)="callsignChange.emit($any($event.target).value)">
                    </span>
                    <button type="button" class="min-h-10 rounded-xl bg-orange-500 px-4 text-sm font-black tracking-normal text-white hover:bg-orange-400" (click)="profileSave.emit()">Save</button>
                </label>
            </div>
            <a href="/#toolbox" class="shrink-0 text-sm font-semibold text-orange-300 hover:text-orange-200">← Back</a>
        </div>
    </header>

    <app-segmented-navigation
            [options]="navigationOptions"
            [selected]="activeWorkspace"
            columnsClass="grid-cols-3"
            ariaLabel="CW trainer sections"
            (selectedChange)="workspaceSelect.emit($any($event))"
    />
</div>
