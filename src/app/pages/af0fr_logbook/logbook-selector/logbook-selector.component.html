<section class="rounded-2xl bg-slate-950 p-2 text-white shadow-xl">
    <div class="flex gap-2 overflow-x-auto pb-2" aria-label="Named logbooks">
        <button *ngFor="let logbook of logbooks" type="button" class="min-h-11 min-w-max rounded-xl px-4 text-left text-sm font-black transition" [class.bg-orange-500]="activeLogId === logbook.id" [class.text-white]="activeLogId === logbook.id" [class.bg-slate-900]="activeLogId !== logbook.id" [class.text-slate-300]="activeLogId !== logbook.id" (click)="logbookSelect.emit(logbook.id)">
            {{ logbook.name }}
            <span class="ml-2 rounded-full bg-white/10 px-2 py-0.5 text-[10px]">{{ logbook.entries.length }}</span>
        </button>
    </div>
    <div class="grid gap-2 border-t border-slate-800 pt-2 sm:grid-cols-[minmax(0,1fr)_auto_auto]">
        <input class="ui-control-dark text-sm font-bold" [ngModel]="newLogName" (ngModelChange)="newLogNameChange.emit($event)" placeholder="New logbook name">
        <button type="button" class="ui-button-primary" (click)="logbookAdd.emit()">Add log</button>
        <div class="grid grid-cols-2 gap-2">
            <button type="button" class="ui-button-muted bg-slate-800 text-slate-100 hover:bg-slate-700" (click)="activeLogbookRename.emit()">Rename</button>
            <button type="button" class="ui-button-danger" (click)="activeLogbookDelete.emit()">Delete</button>
        </div>
    </div>
</section>
